# wheeltec_sim2real_bridge 参数 (Ubuntu 20.04 + ROS2 Foxy)
# 对照 D:\a ROS1 wheeltec_arm_pick/launch/base_serial.launch 与 wheeltec_arm_six.cpp。
wheeltec_arm_six:
  ros__parameters:
    usart_port_name: /dev/wheeltec_controller
    serial_baud_rate: 115200
    robot_frame_id: base_link
    odom_frame_id: odom_combined
    product_number: 1
    joint_num: 4

    # 前端 RosBridge.js 发布的话题。不要改名, 除非前端同步修改。
    arm_command_topic: voice_joint_states
    cmd_vel_topic: cmd_vel

    # STM32 上行帧没有机械臂编码器角度。true 表示把下发的关节目标值回显为
    # /joint_states, 让浏览器数字孪生和 robot_state_publisher 能同步显示。
    echo_joint_states: true
    init_arm_on_startup: true
    publish_tf: true
    read_timeout_sec: 0.02
